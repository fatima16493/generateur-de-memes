<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meme Generator - Admission SUPINFO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Meme Generator</h1>
    
    <div class="main-container">
        <div class="controls">
            
            <div class="control-section">
                <h3>1. Choisir une base</h3>
                <div class="file-label" id="labelTrigger">Importer mon image</div>
                <input type="file" id="imageInput" accept="image/jpeg, image/png" style="display: none;">
                
                <div class="template-library">
                    <p>Ou utiliser un modèle (Cloud) :</p>
                    <div class="template-grid">
                        <img src="https://i.imgflip.com/26am.jpg" class="template-thumb" alt="Boromir">
                        <img src="https://i.imgflip.com/1bij.jpg" class="template-thumb" alt="Fry">
                        <img src="https://i.imgflip.com/9ehk.jpg" class="template-thumb" alt="Grumpy Cat">
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>2. Ambiance du fond</h3>
                <div class="filter-group">
                    <button type="button" class="filter-btn" data-filter="none">Normal</button>
                    <button type="button" class="filter-btn" data-filter="grayscale(100%)">Triste (N&B)</button>
                    <button type="button" class="filter-btn" data-filter="sepia(100%)">Ancien</button>
                    <button type="button" class="filter-btn" data-filter="brightness(1.5) contrast(1.2)">Joie</button>
                    <button type="button" class="filter-btn" data-filter="hue-rotate(300deg) saturate(5)">Colère</button>
                </div>
            </div>

            <div class="control-section">
                <h3>3. Texte & Émotions</h3>
                <div class="input-wrapper">
                    <input type="text" id="textInput" placeholder="Tapez votre texte ici..." autocomplete="off">
                    <button type="button" id="addTextBtn" class="add-btn">AJOUTER</button>
                </div>

                <div class="emoji-selector">
                    <p>Ajouter une émotion :</p>
                    <div class="emoji-row">
                        <span class="emoji-item">😂</span><span class="emoji-item">😡</span>
                        <span class="emoji-item">😭</span><span class="emoji-item">😎</span>
                        <span class="emoji-item">🔥</span><span class="emoji-item">✨</span>
                        <span class="emoji-item">👑</span><span class="emoji-item">💀</span>
                    </div>
                </div>

                <div class="style-row">
                    <div class="style-item">
                        <label>Couleur :</label>
                        <input type="color" id="textColor" value="#ffffff">
                    </div>
                    <div class="style-item">
                        <label>Taille :</label>
                        <input type="range" id="fontSizeRange" min="20" max="150" value="60">
                    </div>
                </div>

                <div class="font-control">
                    <label>Police :</label>
                    <select id="fontSelect">
                        <option value="Impact" selected>Impact (Meme)</option>
                        <option value="Arial">Arial</option>
                        <option value="Verdana">Verdana</option>
                        <option value="Courier New">Courier New</option>
                    </select>
                </div>

                <button id="deleteSelectedBtn" class="delete-btn" style="display:none;">Supprimer l'élément sélectionné</button>
            </div>

            <p class="hint">💡 Astuce : Cliquez sur un texte/emoji pour le déplacer ou le supprimer.</p>
            
            <div class="button-group">
                <button id="downloadBtn" class="primary-btn">Télécharger le mème</button>
                <button id="shareBtn" class="share-btn">Partager</button>
                <button id="saveBtn" class="secondary-btn">Sauvegarder en Galerie</button>
            </div>
        </div>

        <div class="preview-area">
            <canvas id="memeCanvas"></canvas>
        </div>
    </div>

    <section class="gallery-section">
        <div class="gallery-header">
            <h2>Ma Galerie</h2>
            <p>Cliquez sur une image pour rééditer le mème</p>
            <button id="clearGallery" class="clear-btn">Effacer tout</button>
        </div>
        <div id="galleryContainer" class="gallery-grid"></div>
    </section>

    <script src="script.js"></script>
</body>
</html>
